site_name: mcp-tuikit
site_description: Bridging Large Language Models and TUI Applications via the Model Context Protocol
site_url: https://dragoscirjan.github.io/mcp-tuikit/
repo_url: https://github.com/dragoscirjan/mcp-tuikit
repo_name: dragoscirjan/mcp-tuikit

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          # eslint-disable-next-line yml/no-empty-mapping-value
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      # eslint-disable-next-line yml/no-empty-mapping-value
      emoji_index: !!python/name:material.extensions.emoji.twemoji # eslint-disable-next-line yml/no-empty-mapping-value


      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Setup with LLMs: getting-started/llm-setup.md
  - Core Concepts:
      - YAML Flows: core-concepts/yaml-flows.md
  - Reference:
      - MCP Tools: reference/tools.md
      - Native Backends: reference/backends.md
      - Environment Variables: reference/environment-variables.md
  - Project:
      - Troubleshooting: possible-problems.md
      - Contributing: project/contributing.md
      - Changelog: project/changelog.md
