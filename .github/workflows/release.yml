name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required by semantic-release for commits analysis

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 # Use modern pnpm version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm run build

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        # Using multi-semantic-release for independent versioning in pnpm workspaces
        run: pnpm dlx multi-semantic-release

  docs:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Build MkDocs
        run: |
          uv sync
          uv run mkdocs build

      - name: Checkout GitHub Pages repo
        uses: actions/checkout@v4
        with:
          repository: dragoscirjan/dragoscirjan.github.io
          token: ${{ secrets.GH_TOKEN }}
          path: docs-repo

      - name: Deploy Docs to subfolder
        run: |
          # Remove old docs if they exist, copy new ones
          rm -rf docs-repo/mcp-tuikit
          cp -R site docs-repo/mcp-tuikit

          # Commit and push
          cd docs-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mcp-tuikit

          if git diff-index --quiet HEAD; then
            echo "No documentation changes to deploy."
          else
            git commit -m "docs(mcp-tuikit): update documentation site"
            git push
          fi
