version: '1.0'
description: 'Open btop, capture initial view, then toggle to show only processes list'
steps:
  - action: spawn
    cmd: btop

  # Wait for btop to fully render
  - action: wait_for
    pattern: 'CPU'
    timeoutMs: 15000

  - action: sleep
    ms: 1000

  # Snapshot before pressing h (initial default view)
  - action: snapshot
    format: png
    outputPath: 'snapshots/btop-initial-{hash}.png'
    intent: 'btop initial view before toggling'

  # Toggle OFF CPU box (key 1)
  - action: send_key
    key: '1'

  - action: sleep
    ms: 500

  # Toggle OFF MEM box (key 2)
  - action: send_key
    key: '2'

  - action: sleep
    ms: 500

  # Toggle OFF NET box (key 3)
  - action: send_key
    key: '3'

  - action: sleep
    ms: 1000

  # Snapshot showing only the processes list
  - action: snapshot
    format: png
    outputPath: 'snapshots/btop-processes-only-{hash}.png'
    intent: 'btop showing ONLY processes list'

  - action: snapshot
    format: txt
    outputPath: 'snapshots/btop-processes-only-{hash}.txt'
    intent: 'btop processes-only text output'
